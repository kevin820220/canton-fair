<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>14.3馆拜访登记</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --g:#00a653;--g2:#008c45;--amber:#f59e0b;--amber2:#d97706;
  --bg:#f0f7f2;--card:#fff;--txt:#1a1a1a;--sub:#666;--bd:#e2e8ec;
  --green:#10b981;--blue:#3b82f6;--red:#ef4444;--gray:#6b7280;
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;padding-bottom:90px}
#stats{position:sticky;top:0;z-index:50;background:var(--g);color:#fff;padding:14px 16px 12px;box-shadow:0 2px 12px rgba(0,0,0,.18)}
.stats-row{display:flex;gap:10px}
.stat-item{flex:1;background:rgba(255,255,255,.18);border-radius:10px;padding:8px 6px;text-align:center;backdrop-filter:blur(4px)}
.stat-item .num{font-size:22px;font-weight:700;line-height:1}
.stat-item .lbl{font-size:11px;opacity:.85;margin-top:2px}
#search{padding:10px 14px;background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:72px;z-index:49}
#search input{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:10px;font-size:15px;background:var(--bg);outline:none;transition:border .2s}
#search input:focus{border-color:var(--g);background:#fff}
#list{padding:10px 12px}
.company-card{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);border:2px solid transparent;transition:all .2s}
.company-card.touched{border-color:var(--green)}
.company-card.hot{border-color:var(--amber);box-shadow:0 2px 14px rgba(245,158,11,.28)}
.card-header{display:flex;align-items:flex-start;gap:10px;padding:13px 14px 10px}
.rank-badge{flex-shrink:0;width:34px;height:34px;background:var(--g);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;line-height:1}
.company-card.hot .rank-badge{background:var(--amber)}
.card-body{flex:1;overflow:hidden}
.cn-name{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:5px;color:var(--txt)}
.booth-tag{display:inline-flex;align-items:center;font-size:12px;color:var(--g);background:#e8f8ee;padding:3px 8px;border-radius:20px;font-weight:600;margin-bottom:5px}
.company-card.hot .booth-tag{color:var(--amber2);background:#fef3c7}
.meta{display:flex;flex-wrap:wrap;gap:5px;font-size:12px;color:var(--sub)}
.meta span{background:#f5f5f5;padding:2px 7px;border-radius:4px}
.teu-badge{background:#fff7ed!important;color:var(--amber2)!important;font-weight:600!important;border:1px solid #fed7aa!important}
.actions{padding:0 14px 12px;display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.btn-act{min-height:44px;border:1.5px solid var(--bd);border-radius:9px;background:#fff;font-size:12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:4px 2px;color:var(--txt);font-weight:500}
.btn-act:active{transform:scale(.93)}
.btn-act.on1{background:var(--green);color:#fff;border-color:var(--green)}
.btn-act.on2{background:var(--amber);color:#fff;border-color:var(--amber)}
.btn-act.on3{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-act.on4{background:#07c160;color:#fff;border-color:#07c160}
.btn-act .b-icon{font-size:17px;line-height:1}
.btn-act .b-lbl{font-size:11px}
.rating{padding:0 14px 13px;display:flex;align-items:center;gap:8px}
.rating label{font-size:13px;color:var(--sub);white-space:nowrap}
.rating-btns{display:flex;gap:6px;flex:1}
.rtag{width:38px;height:38px;border-radius:50%;border:2px solid var(--bd);background:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--txt)}
.rtag:active{transform:scale(.88)}
.rtag.sel{color:#fff}
.rtag.a.sel{background:var(--red);border-color:var(--red)}
.rtag.b.sel{background:var(--amber);border-color:var(--amber)}
.rtag.c.sel{background:var(--blue);border-color:var(--blue)}
.rtag.d.sel{background:var(--gray);border-color:var(--gray)}
#bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bd);padding:10px 14px;display:flex;gap:10px;z-index:50;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
#bottom .btn{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700;border:none;cursor:pointer;text-align:center;transition:all .15s}
#bottom .btn:active{transform:scale(.97)}
.btn-ghost{background:var(--bg);color:var(--txt)}
.btn-main{background:var(--g);color:#fff;box-shadow:0 4px 14px rgba(0,166,83,.35)}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;z-index:200;pointer-events:none;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
.empty{padding:60px 20px;text-align:center;color:var(--sub)}
@media(min-width:600px){#list{max-width:500px;margin:0 auto}} 
</style>
</head>
<body>

<div id="stats">
  <div class="stats-row">
    <div class="stat-item"><div class="num" id="s-t">0</div><div class="lbl">已触达</div></div>
    <div class="stat-item"><div class="num" id="s-d">0</div><div class="lbl">有需求</div></div>
    <div class="stat-item"><div class="num" id="s-k">0</div><div class="lbl">关键人</div></div>
    <div class="stat-item"><div class="num" id="s-w">0</div><div class="lbl">加微</div></div>
  </div>
</div>

<div id="search">
  <input type="text" id="kw" placeholder="搜索公司名 / 展位 / 品名" />
</div>

<div id="list"></div>

<div id="bottom">
  <button class="btn btn-ghost" onclick="resetAll()">重置</button>
  <button class="btn btn-main" onclick="doExport()">导出CSV</button>
</div>

<div class="toast" id="toast"></div>

<script>
const COMPANIES=[{"id": 1, "name": "广东日丰电缆股份有限公司", "booth": "14.3A16-17", "products": "电线电缆、电源线插头", "port": "深圳、南沙", "us_teu": "1,200+ TEU"}, {"id": 2, "name": "浙江泰达微电机有限公司", "booth": "14.3A08-09", "products": "微特电机、清洗机马达", "port": "宁波、上海", "us_teu": "240+ TEU"}, {"id": 3, "name": "杭州鸿世电器股份有限公司", "booth": "14.3A12-13", "products": "智能插座、调光器", "port": "宁波、上海", "us_teu": "180+ TEU"}, {"id": 4, "name": "上海起帆电缆股份有限公司", "booth": "14.3.B06-07", "products": "电力电缆、通信电缆", "port": "上海、宁波", "us_teu": "950+ TEU"}, {"id": 5, "name": "优利德科技(中国)股份有限公司", "booth": "14.3B43-44", "products": "数字多用表、红外测温仪", "port": "深圳、盐田", "us_teu": "650+ TEU"}, {"id": 6, "name": "明珠电气股份有限公司", "booth": "14.3B40-41", "products": "变压器、电抗器、开关柜", "port": "广州、南沙", "us_teu": "580+ TEU"}, {"id": 7, "name": "上海德力西电器有限公司", "booth": "14.3B34-35", "products": "断路器、交流接触器", "port": "上海、宁波", "us_teu": "450+ TEU"}, {"id": 8, "name": "浙江正泰仪器仪表有限责任公司", "booth": "14.3B38-39", "products": "电能表、水表、气表", "port": "宁波、上海", "us_teu": "430+ TEU"}, {"id": 9, "name": "乐清市亚安防爆电气有限公司", "booth": "14.3B42", "products": "防爆灯具、防爆配电箱", "port": "宁波、温州", "us_teu": "290+ TEU"}, {"id": 10, "name": "中山市家的电器有限公司", "booth": "14.3.B03-05", "products": "大面板开关、LED插座", "port": "深圳、中山", "us_teu": "150+ TEU"}, {"id": 11, "name": "三友联众集团股份有限公司", "booth": "14.3C21-22", "products": "继电器、互感器、互感磁芯", "port": "深圳、东莞", "us_teu": "820+ TEU"}, {"id": 12, "name": "福建省闽华电源股份有限公司", "booth": "14.3C40", "products": "铅酸蓄电池、储能电池", "port": "厦门、福州", "us_teu": "780+ TEU"}, {"id": 13, "name": "浙江华光电器集团有限公司", "booth": "14.3C06-07", "products": "挂烫机、蒸汽电熨斗", "port": "宁波、上海", "us_teu": "380+ TEU"}, {"id": 14, "name": "桂林国际电线电缆集团有限责任公司", "booth": "14.3C19-20", "products": "橡胶电缆、光伏线缆", "port": "钦州、广州", "us_teu": "360+ TEU"}, {"id": 15, "name": "嘉兴新缆电缆股份有限公司", "booth": "14.3C13", "products": "各种规格电线、BV/BVR线", "port": "宁波、嘉兴", "us_teu": "340+ TEU"}, {"id": 16, "name": "建德市勇华电器有限公司", "booth": "14.3C01-02", "products": "卷线器、拖线板、转换器", "port": "宁波", "us_teu": "250+ TEU"}, {"id": 17, "name": "武汉高德智感科技有限公司", "booth": "14.3C17-18", "products": "手持红外热像仪", "port": "深圳、武汉", "us_teu": "190+ TEU"}, {"id": 18, "name": "温州宝翔科技有限公司", "booth": "14.3C08", "products": "稳压器、逆变器", "port": "宁波、温州", "us_teu": "160+ TEU"}, {"id": 19, "name": "江西恒力电池科技有限公司", "booth": "14.3D19-20", "products": "密封蓄电池、动力电池", "port": "宁波、九江", "us_teu": "540+ TEU"}, {"id": 20, "name": "宁波凯峰电器有限公司", "booth": "14.3D31-32", "products": "接线端子、连接器", "port": "宁波", "us_teu": "270+ TEU"}, {"id": 21, "name": "河南通达电缆股份有限公司", "booth": "14.3E42", "products": "钢芯铝绞线、架空导线", "port": "青岛、天津", "us_teu": "620+ TEU"}, {"id": 22, "name": "佛山市德诚远景进出口有限公司", "booth": "14.3E40-41", "products": "通用电器附件、开关", "port": "佛山、南沙", "us_teu": "210+ TEU"}, {"id": 23, "name": "固达电线电缆(集团)有限公司", "booth": "14.3F23-24", "products": "环保家装线、电力电缆", "port": "南沙、深圳", "us_teu": "140+ TEU"}, {"id": 24, "name": "意华控股集团有限公司", "booth": "14.3G40-42", "products": "汽车连接器、通讯连接器", "port": "宁波、上海", "us_teu": "320+ TEU"}, {"id": 25, "name": "广东俊朗松田电器有限公司", "booth": "14.3G34-35", "products": "墙壁开关、插座", "port": "深圳、南沙", "us_teu": "200+ TEU"}, {"id": 26, "name": "深圳市华盛昌科技实业股份有限公司", "booth": "14.3H18-19", "products": "测量仪表、环境测试仪", "port": "深圳、盐田", "us_teu": "490+ TEU"}, {"id": 27, "name": "广东金联宇电缆集团有限公司", "booth": "14.3H14-15", "products": "低压电线、建筑用线", "port": "佛山、南沙", "us_teu": "410+ TEU"}, {"id": 28, "name": "浙江天齐电气有限公司", "booth": "14.3H33-34", "products": "配电箱、仪表机箱", "port": "宁波", "us_teu": "220+ TEU"}, {"id": 29, "name": "宁波恒达高智能科技股份有限公司", "booth": "14.3H16-17", "products": "智能控制器、遥控器", "port": "宁波", "us_teu": "170+ TEU"}, {"id": 30, "name": "温州益坤电气股份有限公司", "booth": "14.3H31-32", "products": "避雷器、绝缘子", "port": "宁波、温州", "us_teu": "130+ TEU"}];

let data={};
try{data=JSON.parse(localStorage.getItem('cf143_v3')||'{}')}catch(e){}

function save(){localStorage.setItem('cf143_v3',JSON.stringify(data));refresh()}

function refresh(){
  let t=0,d=0,k=0,w=0;
  Object.values(data).forEach(v=>{if(v.t)t++;if(v.d)d++;if(v.k)k++;if(v.w)w++});
  document.getElementById('s-t').textContent=t;
  document.getElementById('s-d').textContent=d;
  document.getElementById('s-k').textContent=k;
  document.getElementById('s-w').textContent=w;
  render();
}

function render(){
  const kw=document.getElementById('kw').value.trim().toLowerCase();
  const list=document.getElementById('list');
  const flt=COMPANIES.filter(c=>!kw||c.name.toLowerCase().includes(kw)||c.booth.toLowerCase().includes(kw)||c.products.toLowerCase().includes(kw));
  if(!flt.length){list.innerHTML='<div class=empty><p>未找到匹配展商</p></div>';return}
  list.innerHTML=flt.map(c=>{
    const v=data[c.id]||{};
    const hot=v.d;
    const cls=hot?'hot':(v.t?'touched':'');
    return `<div class="company-card ${cls}" id="c${c.id}">
      <div class="card-header">
        <div class="rank-badge">${c.id}</div>
        <div class="card-body">
          <div class="cn-name">${c.name}</div>
          <div class="booth-tag">${c.booth}</div>
          <div class="meta">
            <span>${c.products}</span>
            <span>${c.port}</span>
            <span class="teu-badge">${c.us_teu}</span>
          </div>
        </div>
      </div>
      <div class="actions">
        <button class="btn-act ${v.t?'on1':''}" onclick="setv(${c.id},'t')">
          <div class="b-icon">${v.t?'&#10003;':'&#128204;';}</div>
          <div class="b-lbl">触达</div>
        </button>
        <button class="btn-act ${v.d?'on2':''}" onclick="setv(${c.id},'d')">
          <div class="b-icon">${v.d?'&#9733;':'&#128293;'}</div>
          <div class="b-lbl">有需求</div>
        </button>
        <button class="btn-act ${v.k?'on3':''}" onclick="setv(${c.id},'k')">
          <div class="b-icon">&#128100;</div>
          <div class="b-lbl">关键人</div>
        </button>
        <button class="btn-act ${v.w?'on4':''}" onclick="setv(${c.id},'w')">
          <div class="b-icon">${v.w?'&#10003;':'&#128172;'}</div>
          <div class="b-lbl">加微</div>
        </button>
      </div>
      <div class="rating">
        <label>评级:</label>
        <div class="rating-btns">
          <button class="rtag a ${v.r==='A'?'sel':''}" onclick="setr(${c.id},'A')">A</button>
          <button class="rtag b ${v.r==='B'?'sel':''}" onclick="setr(${c.id},'B')">B</button>
          <button class="rtag c ${v.r==='C'?'sel':''}" onclick="setr(${c.id},'C')">C</button>
          <button class="rtag d ${v.r==='D'?'sel':''}" onclick="setr(${c.id},'D')">D</button>
        </div>
      </div>
    </div>`
  }).join('')
}

function setv(id,f){if(!data[id])data[id]={};data[id][f]=!data[id][f];save()}
function setr(id,r){if(!data[id])data[id]={};data[id].r=data[id].r===r?null:r;save()}

function resetAll(){if(!confirm('确定清空所有登记数据？'))return;data={};save();showToast('已清空')}

function doExport(){
  const rows=COMPANIES.map(c=>{const v=data[c.id]||{};return[c.id,c.name,c.booth,c.products,c.port,c.us_teu,v.t?'是':'否',v.d?'是':'否',v.k?'是':'否',v.w?'是':'否',v.r||''].join(',')});
  const csv='序号,公司名称,展位号,核心品名,起运港,对美货量,已触达,有需求,关键人,加微,评级\n'+rows.join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='广交会14.3馆拜访记录_'+new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')+'.csv';a.click();
  showToast('已导出CSV')
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

document.getElementById('kw').addEventListener('input',render);
refresh();
</script>
</body>
</html>
