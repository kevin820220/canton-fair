<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>鲸宝 × 广交会新能源展商登记</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0a0e13;
      --surface: #111720;
      --card: #162030;
      --card-hover: #1c2a3a;
      --accent: #00d084;
      --accent-dim: rgba(0, 208, 132, 0.15);
      --accent2: #3d9eff;
      --text: #e8eaf0;
      --text-muted: #6b7a90;
      --text-dim: #3d4a5c;
      --border: rgba(255,255,255,0.07);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 16px;
      --radius-sm: 10px;
      --tag-green: #1a3a2a;
      --tag-yellow: #3a2e0a;
      --tag-blue: #1a2a3a;
      --red: #ff4d6a;
      --amber: #ffb340;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans SC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 100px;
    }

    /* Header */
    .header {
      background: linear-gradient(165deg, #0d1825 0%, #0a1018 100%);
      padding: env(safe-area-inset-top) 20px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    .header-date {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* Progress Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 8px;
      text-align: center;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-num.blue { color: var(--accent2); }
    .stat-num.amber { color: var(--amber); }
    .stat-num.red { color: var(--red); }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Filter Tabs */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 14px 20px 6px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn .count {
      display: inline-block;
      margin-left: 4px;
      font-size: 11px;
      opacity: 0.7;
    }

    /* Company List */
    .company-list {
      padding: 8px 16px 20px;
    }

    .company-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
      transition: all 0.25s;
    }

    .company-card.visited {
      border-color: rgba(0, 208, 132, 0.3);
    }

    .company-main {
      padding: 16px;
      cursor: pointer;
    }

    .company-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .company-index {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      background: var(--accent-dim);
      border: 1px solid rgba(0,208,132,0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .company-card.visited .company-index {
      background: rgba(0,208,132,0.2);
    }

    .company-info {
      flex: 1;
      min-width: 0;
    }

    .company-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .company-booth {
      font-size: 12px;
      color: var(--accent2);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .company-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 500;
    }

    .tag-priority {
      background: rgba(255, 77, 106, 0.15);
      color: var(--red);
      border: 1px solid rgba(255,77,106,0.3);
    }

    .tag-storage {
      background: rgba(61, 154, 255, 0.12);
      color: var(--accent2);
      border: 1px solid rgba(61,154,255,0.25);
    }

    .tag-pump {
      background: rgba(255, 179, 64, 0.12);
      color: var(--amber);
      border: 1px solid rgba(255,179,64,0.25);
    }

    .tag-ups {
      background: rgba(150, 100, 255, 0.12);
      color: #c49fff;
      border: 1px solid rgba(150,100,255,0.25);
    }

    .tag-battery {
      background: rgba(255, 160, 60, 0.12);
      color: #ffa03c;
      border: 1px solid rgba(255,160,60,0.25);
    }

    .tag-ev {
      background: rgba(0, 208, 132, 0.12);
      color: var(--accent);
      border: 1px solid rgba(0,208,132,0.25);
    }

    .company-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .visit-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(0,208,132,0.3);
    }

    .visit-badge.unvisited {
      background: rgba(107,122,144,0.15);
      color: var(--text-muted);
      border-color: var(--border);
    }

    /* Expanded Form */
    .company-form {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }

    .company-card.open .company-form {
      display: block;
    }

    .form-row {
      margin-top: 12px;
    }

    .form-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-toggle-group {
      display: flex;
      gap: 6px;
    }

    .toggle-btn {
      flex: 1;
      padding: 8px 6px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn.selected-yes {
      background: rgba(0, 208, 132, 0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .toggle-btn.selected-no {
      background: rgba(255, 77, 106, 0.15);
      border-color: var(--red);
      color: var(--red);
    }

    .toggle-btn.selected-maybe {
      background: rgba(255, 179, 64, 0.15);
      border-color: var(--amber);
      color: var(--amber);
    }

    /* Rating Stars */
    .rating-group {
      display: flex;
      gap: 6px;
    }

    .star-btn {
      flex: 1;
      padding: 8px 4px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .star-btn.selected {
      border-color: var(--accent);
      color: var(--accent);
    }

    .star-btn.s1.selected { background: rgba(255,77,106,0.15); border-color: var(--red); color: var(--red); }
    .star-btn.s2.selected { background: rgba(255,179,64,0.15); border-color: var(--amber); color: var(--amber); }
    .star-btn.s3.selected { background: rgba(61,154,255,0.15); border-color: var(--accent2); color: var(--accent2); }
    .star-btn.s4.selected { background: rgba(0,208,132,0.2); border-color: var(--accent); color: var(--accent); }
    .star-btn.s5.selected { background: rgba(0,208,132,0.3); border-color: var(--accent); color: #00ffaa; }

    .form-notes {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 10px 12px;
      resize: none;
      outline: none;
      min-height: 60px;
      transition: border-color 0.2s;
    }

    .form-notes:focus {
      border-color: var(--accent);
    }

    .form-notes::placeholder {
      color: var(--text-dim);
    }

    .save-btn {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: var(--accent);
      color: #000;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .save-btn:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    /* WeChat Add Prompt */
    .wechat-field {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .wechat-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .wechat-input:focus { border-color: var(--accent); }
    .wechat-input::placeholder { color: var(--text-dim); }

    .wechat-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      background: rgba(0, 208, 132, 0.15);
      color: var(--accent);
      border: 1px solid rgba(0,208,132,0.3);
      white-space: nowrap;
    }

    .wechat-badge.pending {
      background: rgba(107,122,144,0.15);
      color: var(--text-muted);
      border-color: var(--border);
    }

    /* Floating Action */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      left: 20px;
      z-index: 200;
      pointer-events: none;
    }

    .fab-inner {
      background: var(--accent);
      color: #000;
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,208,132,0.4);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      pointer-events: all;
      transition: all 0.2s;
    }

    .fab-inner:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    /* Slide animation */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .company-card.open .company-main {
      animation: none;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .empty-state p {
      font-size: 13px;
    }

    /* Section headers in list */
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 16px 8px;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .section-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Card open state */
    .company-card.open {
      background: var(--card-hover);
      border-color: rgba(0,208,132,0.3);
    }

    .chevron {
      transition: transform 0.2s;
      color: var(--text-dim);
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .company-card.open .chevron {
      transform: rotate(180deg);
    }
  </style>
</head>

<div class="company-list" id="company-list"></div>

<div class="fab">

  { id: 40, name: "南京欧陆电气股份有限公司", alias: "", booth: "15.2J05", tag: "tag-ev", tagLabel: "新能源控制器", priority: 3, hall: "15.2" },

// Storage
const STORAGE_KEY = 'whal宝_exhibition_v1';
let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let currentFilter = 'all';
let openCardId = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function getRecord(id) {
  return records[id] || { reached: null, needs: null, keyPerson: null, wechat: '', rating: null, notes: '' };
}

function setRecord(id, field, value) {
  if (!records[id]) records[id] = { reached: null, needs: null, keyPerson: null, wechat: '', rating: null, notes: '' };
  records[id][field] = value;
  save();
}

function updateStats() {
  const all = companies;
  const reached = all.filter(c => (records[c.id] || {}).reached === true);
  const needs = all.filter(c => (records[c.id] || {}).needs === true);
  const wechat = all.filter(c => (records[c.id] || {}).wechat && (records[c.id] || {}).wechat.trim() !== '');
  const starred = all.filter(c => (records[c.id] || {}).rating && records[c.id].rating >= 3);
  const unvisited = all.filter(c => !(records[c.id] || {}).reached);

  document.getElementById('stat-reached').textContent = reached.length;
  document.getElementById('stat-needs').textContent = needs.length;
  document.getElementById('stat-wechat').textContent = wechat.length;
  document.getElementById('cnt-all').textContent = all.length;
  document.getElementById('cnt-reached').textContent = reached.length;
  document.getElementById('cnt-needs').textContent = needs.length;
  document.getElementById('cnt-starred').textContent = starred.length;
  document.getElementById('cnt-unvisited').textContent = unvisited.length;
}

function renderList() {
  const container = document.getElementById('company-list');
  let filtered = companies;

  if (currentFilter === 'unvisited') filtered = companies.filter(c => !(records[c.id] || {}).reached);
  else if (currentFilter === 'reached') filtered = companies.filter(c => (records[c.id] || {}).reached === true);
  else if (currentFilter === 'needs') filtered = companies.filter(c => (records[c.id] || {}).needs === true);
  else if (currentFilter === 'starred') filtered = companies.filter(c => (records[c.id] || {}).rating >= 3);

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <h3>暂无符合条件的企业</h3>
        <p>换个筛选条件试试</p>
      </div>`;
    return;
  }

  // Group by hall
  const halls = {};
  filtered.forEach(c => {
    if (!halls[c.hall]) halls[c.hall] = [];
    halls[c.hall].push(c);
  });

  let html = '';
  Object.keys(halls).sort().forEach(hall => {
    html += `<div class="section-header">📍 展馆 ${hall}</div>`;
    halls[hall].forEach(c => {
      const rec = getRecord(c.id);
      const isVisited = rec.reached === true;
      const isOpen = openCardId === c.id;
      const priorityLabel = c.priority === 1 ? '⭐核心' : c.priority === 2 ? '✨重点' : '';

      html += `
      <div class="company-card${isVisited ? ' visited' : ''}${isOpen ? ' open' : ''}" data-id="${c.id}">
        <div class="company-main" onclick="toggleCard(${c.id})">
          <div class="company-top">
            <div class="company-index">${c.id}</div>
            <div class="company-info">
              <div class="company-name">${c.name}${c.alias ? ` <span style="color:var(--text-muted);font-weight:400">(${c.alias})</span>` : ''}</div>
              <div class="company-booth">📍 ${c.booth}</div>
            </div>
            <div class="chevron">▼</div>
          </div>
          <div class="company-tags">
            ${priorityLabel ? `<span class="tag tag-priority">${priorityLabel}</span>` : ''}
            <span class="tag ${c.tag}">${c.tagLabel}</span>
            ${isVisited ? `<span class="visit-badge">✅ 已触达</span>` : `<span class="visit-badge unvisited">⚪ 未触达</span>`}
          </div>
        </div>
        <div class="company-form">
          <div class="form-row">
            <div class="form-label">❓ 是否触达</div>
            <div class="form-toggle-group">
              <button class="toggle-btn${rec.reached === true ? ' selected-yes' : ''}" onclick="setToggle(${c.id},'reached',true)">✅ 触达</button>
              <button class="toggle-btn${rec.reached === false ? ' selected-no' : ''}" onclick="setToggle(${c.id},'reached',false)">❌ 未触达</button>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">💡 是否有 DDP 物流需求</div>
            <div class="form-toggle-group">
              <button class="toggle-btn${rec.needs === true ? ' selected-yes' : ''}" onclick="setToggle(${c.id},'needs',true)">✅ 有需求</button>
              <button class="toggle-btn${rec.needs === false ? ' selected-no' : ''}" onclick="setToggle(${c.id},'needs',false)">❌ 无需求</button>
              <button class="toggle-btn${rec.needs === null && rec.reached !== null ? ' selected-maybe' : ''}" onclick="setToggle(${c.id},'needs',null)">❓ 待定</button>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">👤 是否关键人</div>
            <div class="form-toggle-group">
              <button class="toggle-btn${rec.keyPerson === true ? ' selected-yes' : ''}" onclick="setToggle(${c.id},'keyPerson',true)">✅ 是</button>
              <button class="toggle-btn${rec.keyPerson === false ? ' selected-no' : ''}" onclick="setToggle(${c.id},'keyPerson',false)">❌ 否</button>
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">⭐ 综合评级</div>
            <div class="rating-group">
              ${[1,2,3,4,5].map(n => `<button class="star-btn s${n}${rec.rating === n ? ' selected' : ''}" onclick="setToggle(${c.id},'rating',${n})">${'★'.repeat(n)}</button>`).join('')}
            </div>
          </div>
          <div class="form-row">
            <div class="form-label">💬 备注 / 联系人信息</div>
            <textarea class="form-notes" id="notes-${c.id}" placeholder="可填写：联系人姓名、职务、微信、手机..." onblur="saveNotes(${c.id})">${rec.notes || ''}</textarea>
          </div>
          <button class="save-btn" onclick="toggleCard(${c.id})">✓ 保存并收起</button>
        </div>
      </div>`;
    });
  });

  container.innerHTML = html;
}

function toggleCard(id) {
  if (openCardId === id) {
    openCardId = null;
  } else {
    openCardId = id;
  }
  document.querySelectorAll('.company-card').forEach(card => {
    if (parseInt(card.dataset.id) === openCardId) {
      card.classList.add('open');
    } else {
      card.classList.remove('open');
    }
  });
  // Scroll into view
  const el = document.querySelector(`.company-card[data-id="${id}"]`);
  if (el) {
    setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }
}

function setToggle(id, field, value) {
  const current = records[id] ? records[id][field] : null;
  // Toggle off if same value
  if (current === value) {
    if (field === 'reached') setRecord(id, 'reached', null);
    else if (field === 'needs') setRecord(id, 'needs', null);
    else if (field === 'keyPerson') setRecord(id, 'keyPerson', null);
    else if (field === 'rating') setRecord(id, 'rating', null);
  } else {
    setRecord(id, field, value);
  }
  updateStats();
  renderList();
  openCardId = id;
  setTimeout(() => {
    const el = document.querySelector(`.company-card[data-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function saveNotes(id) {
  const val = document.getElementById(`notes-${id}`).value;
  setRecord(id, 'notes', val);
}

// Filter tabs
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    openCardId = null;
    renderList();
  });
});

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  const visited = companies.filter(c => (records[c.id] || {}).reached === true);
  if (visited.length === 0) {
    alert('还没有登记任何企业哦，先去展馆扫一扫！');
    return;
  }

  const date = new Date().toLocaleDateString('zh-CN');
  let csv = '\uFEFF'; // BOM for UTF-8
  csv += `序号,企业名称,展位号,类别,优先级,是否触达,是否有需求,是否关键人,评级,备注\n`;
  visited.forEach(c => {
    const r = records[c.id] || {};
    const priority = c.priority === 1 ? '核心' : c.priority === 2 ? '重点' : '普通';
    csv += `${c.id},"${c.name}",${c.booth},${c.tagLabel},${priority},${r.reached ? '是' : '否'},${r.needs === true ? '是' : r.needs === false ? '否' : '待定'},${r.keyPerson === true ? '是' : r.keyPerson === false ? '否' : '未知'},${r.rating ? r.rating + '星' : ''},"${(r.notes || '').replace(/"/g, '""')}"\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `鲸宝展商登记_${date}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

// Today date
const now = new Date();
const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
document.getElementById('today').textContent = `${now.getMonth()+1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;

updateStats();
renderList();
</script>
</body>
